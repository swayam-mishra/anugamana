version: 2
updates:
  # Maintain dependencies for the Node.js frontend
  - package-ecosystem: "npm"
    directory: "/frontend"
    schedule:
      interval: "weekly"
    groups:
      frontend-updates:
        patterns:
          - "*" # Groups all frontend updates into one PR
          
  # Maintain dependencies for the Python backend
  - package-ecosystem: "pip"
    directory: "/backend"
    schedule:
      interval: "weekly"
    groups:
      backend-updates:
        patterns:
          - "*" # Groups all backend updates into one PR
