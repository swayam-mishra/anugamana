name: Anugamana CI

on:
  pull_request:
    branches: [ "main" ]
  push:
    branches: [ "main" ]

jobs:
  # ----------------------------------
  # Simple Backend Check: Just Lint & Install
  # ----------------------------------
  check-backend:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"
        cache: 'pip'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        # We install dependencies to ensure requirements.txt is valid
        pip install -r backend/requirements.txt
        pip install ruff

    - name: Quick Lint
      run: |
        # This just checks for major syntax errors or broken imports
        ruff check backend/ --select=E9,F63,F7,F82

  # ----------------------------------
  # Simple Frontend Check: Just Build
  # ----------------------------------
  check-frontend:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json

    - name: Install & Build
      working-directory: ./frontend
      run: |
        npm install
        npm run build