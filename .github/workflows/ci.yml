name: Anugamana CI

on:
  pull_request:
    branches: [ "main" ]
  push:
    branches: [ "main" ]

jobs:
  # ----------------------------------
  # JOB 1: Test the Python Backend
  # ----------------------------------
  test-backend:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"
        cache: 'pip'

    - name: Install Backend Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install ruff
        pip install -r backend/requirements.txt

    - name: Lint with Ruff
      run: |
        # Stop the build if there are Python syntax errors or undefined names
        ruff check backend/ --select=E9,F63,F7,F82

    - name: Run RAG Evaluation
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        PINECONE_API_KEY: ${{ secrets.PINECONE_API_KEY }}
        UPSTASH_REDIS_REST_URL: ${{ secrets.UPSTASH_REDIS_REST_URL }}
        UPSTASH_REDIS_REST_TOKEN: ${{ secrets.UPSTASH_REDIS_REST_TOKEN }}
      run: |
        cd backend
        
        # 1. Start the FastAPI server in the background (using the & symbol)
        uvicorn main:app --host 127.0.0.1 --port 8000 &
        
        # 2. Wait for the ONNX models to load and the server to wake up
        echo "Waiting for FastAPI server to start..."
        until curl -s http://127.0.0.1:8000/ > /dev/null; do
          sleep 5
        done
        echo "Server is up! Running tests..."
        
        # 3. Run the evaluation scripts
        python test_rag.py
        python evaluate_accuracy.py

  # ----------------------------------
  # JOB 2: Test the React Frontend Build
  # ----------------------------------
  test-frontend:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20' # Vite requires Node 18+ or 20+
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json

    - name: Install Frontend Dependencies
      working-directory: ./frontend
      run: npm ci # 'ci' is cleaner and faster than 'install' for automated testing

    - name: Build Frontend
      working-directory: ./frontend
      run: npm run build # If this fails, the PR is blocked
