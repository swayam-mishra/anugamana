name: Anugamana CI

on:
  pull_request:
    branches: [ "main" ]
  push:
    branches: [ "main" ]

jobs:
  check-code:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: Install Linting Tools
      run: pip install ruff

    - name: Quick Syntax Check
      # This checks the backend code for syntax errors only (E9) 
      # and undefined names (F821) without needing to install the heavy AI libs.
      run: ruff check backend/ --select=E9,F821

  check-frontend:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
    - name: Install & Build
      working-directory: ./frontend
      run: |
        npm install
        npm run build